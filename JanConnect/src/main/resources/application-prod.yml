spring:
  datasource:
    url: jdbc:mysql://localhost:3306/janconnect_prod?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=false
    username: root
    password: jay2003
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: JanConnectPool-Prod
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false

logging:
  level:
    com.janconnect: WARN
    org.hibernate.SQL: WARN

api:
  security:
    key: janconnect-prod-api-key-pr0d@2024
    header-name: X-API-KEY

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      show-components: never
  info:
    env:
      enabled: true

info:
  app:
    name: JanConnect
    version: v1.0.0
    environment: PROD

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
