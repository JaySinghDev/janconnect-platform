spring:
  datasource:
    url: jdbc:mysql://uat-db-host:3306/janconnect_uat?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: uat_user
    password: uat_password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: JanConnectPool-Uat
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.janconnect: INFO
    org.hibernate.SQL: INFO

api:
  security:
    key: janconnect-uat-api-key-u@t2024
    header-name: X-API-KEY

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: JanConnect
    version: v1.0.0
    environment: UAT

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
