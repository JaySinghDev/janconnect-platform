spring:
  datasource:
    url: jdbc:mysql://localhost:3306/janconnect_prod?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: jay123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: JanConnectPool-Dev
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.janconnect: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

api:
  security:
    key: janconnect-dev-api-key-d3v@2024
    header-name: X-API-KEY

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
  info:
    env:
      enabled: true

info:
  app:
    name: JanConnect
    version: v1.0.0
    environment: DEV

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
